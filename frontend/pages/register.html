<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - MonShop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>Créer un compte ✨</h1>
      <p class="auth-subtitle">Rejoignez-nous en quelques clics</p>
      
      <form id="register-form">
        <div class="form-grid">
          <div class="form-group">
            <label>Prénom <span class="required">*</span></label>
            <input type="text" name="prenom" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Nom <span class="required">*</span></label>
            <input type="text" name="nom" class="form-control" required>
          </div>
        </div>
        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input type="email" name="email" class="form-control" required placeholder="vous@exemple.com">
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="tel" name="telephone" class="form-control" placeholder="06 12 34 56 78">
        </div>
        <div class="form-group">
          <label>Mot de passe <span class="required">*</span></label>
          <input type="password" name="password" class="form-control" required minlength="6" placeholder="Minimum 6 caractères">
        </div>
        <div class="form-group">
          <label>Confirmer le mot de passe <span class="required">*</span></label>
          <input type="password" name="confirmPassword" class="form-control" required>
        </div>
        <label style="display: flex; align-items: start; gap: 0.5rem; cursor: pointer; margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--gray-600);">
          <input type="checkbox" required style="margin-top: 3px;">
          <span>J'accepte les <a href="#" style="color: var(--primary);">conditions générales</a> et la <a href="#" style="color: var(--primary);">politique de confidentialité</a></span>
        </label>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Créer mon compte</button>
      </form>
      
      <p class="auth-link">
        Déjà un compte ? <a href="login.html">Se connecter</a>
      </p>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/components.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', handleRegister);
  </script>
</body>
</html>
