<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - MonShop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>Bon retour ! 👋</h1>
      <p class="auth-subtitle">Connectez-vous à votre compte</p>
      
      <div class="social-login">
        <button class="social-btn">🔵 Google</button>
        <button class="social-btn">⚫ Apple</button>
      </div>
      
      <div class="auth-divider">ou</div>
      
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" class="form-control" required placeholder="vous@exemple.com">
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
            <input type="checkbox"> <span style="font-size: 0.9rem;">Se souvenir de moi</span>
          </label>
          <a href="#" style="color: var(--primary); font-size: 0.9rem;">Mot de passe oublié ?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Se connecter</button>
      </form>
      
      <p class="auth-link">
        Pas encore de compte ? <a href="register.html">Créer un compte</a>
      </p>
      <p class="auth-link" style="margin-top: 0.5rem;">
        <a href="../index.html">← Retour à l'accueil</a>
      </p>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/components.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', handleLogin);
  </script>
</body>
</html>
